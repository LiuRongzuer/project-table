<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Project Table</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <div class="toolbar">\n        <button id="btnAddRow">Add Row</button>\n        <button id="btnCloudSetup">Cloud Setup</button>\n        <button id="btnCloudLoad">Cloud Load</button>\n        <button id="btnCloudSave">Cloud Save</button>\n    </div>\n    <div id="modalOverlay" class="modal-overlay" style="display:none;">\n        <div class="modal">\n            <h2>Cloud Configuration</h2>\n            <label for="cloudEndpoint">Endpoint:</label>\n            <input type="text" id="cloudEndpoint" placeholder="Enter Cloud Endpoint">\n            <label for="cloudKey">Key:</label>\n            <input type="text" id="cloudKey" placeholder="Enter Cloud Key">\n            <label for="cloudSecret">Secret:</label>\n            <input type="password" id="cloudSecret" placeholder="Enter Cloud Secret">\n            <button id="btnCloudTest">Test Connection</button>\n            <button id="btnCloudSaveCfg">Save Configuration</button>\n            <button id="btnCloseModal">Close</button>\n        </div>\n    </div>\n    <script>\n    (function() {\n        const DEFAULT_ENDPOINT = 'https://dawn-truth-af27project-table-api.8206230527.workers.dev';\n        const LOCAL_STORAGE_KEY = 'project_table_cloud_cfg_v1';\n        let cloudConfig = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || { endpoint: DEFAULT_ENDPOINT, key: '', secret: '' };\n        document.getElementById('btnCloudSetup').onclick = function() {\n            document.getElementById('cloudEndpoint').value = cloudConfig.endpoint;\n            document.getElementById('cloudKey').value = cloudConfig.key;\n            document.getElementById('cloudSecret').value = cloudConfig.secret;\n            document.getElementById('modalOverlay').style.display = 'block';\n        };\n        document.getElementById('btnCloseModal').onclick = function() {\n            document.getElementById('modalOverlay').style.display = 'none';\n        };\n        document.getElementById('btnCloudSaveCfg').onclick = function() {\n            cloudConfig.endpoint = document.getElementById('cloudEndpoint').value;\n            cloudConfig.key = document.getElementById('cloudKey').value;\n            cloudConfig.secret = document.getElementById('cloudSecret').value;\n            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cloudConfig));\n            alert('Configuration saved!');\n            document.getElementById('modalOverlay').style.display = 'none';\n        };\n        function cloudLoad() {\n            return fetch('/api/load?key=' + cloudConfig.key, {\n                headers: { 'X-Auth': cloudConfig.secret }\n            }).then(response => response.json());\n        }\n        function cloudSave() {\n            return fetch('/api/save?key=' + cloudConfig.key, {\n                method: 'POST',\n                headers: { 'X-Auth': cloudConfig.secret },\n                body: JSON.stringify({ /* data to save */ })\n            });\n        }\n        const debounce = (func, delay) => {\n            let timeout;\n            return function(...args) {\n                clearTimeout(timeout);\n                timeout = setTimeout(() => func.apply(this, args), delay);\n            };\n        };\n        const debouncedCloudSave = debounce(cloudSave, 1000);\n        // Assuming there's a render function already present in your code.\n        const originalRender = render;\n        function render() {\n            originalRender();\n            scheduleCloudAutoSave();\n        }\n        function scheduleCloudAutoSave() {\n            debouncedCloudSave();\n        }\n    })();\n    </script>\n</body>\n</html>\n
